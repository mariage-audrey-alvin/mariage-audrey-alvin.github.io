<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mariage d'Audrey & Alvin</title>
    <!-- Importation de polices élégantes pour un effet "mariage" -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Plus+Jakarta+Sans:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: #0f1a15; /* Fond sombre assorti à l'image */
            color: #f3f4f6;
            margin: 0;
            padding: 10px; /* Petit espace sur mobile pour l'effet carte */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        
        /* Conteneur principal style "carte de téléphone" */
        .phone-card {
            width: 100%;
            max-width: 480px; /* Format idéal pour mobile et desktop */
            background-color: #1b2e25; /* Vert forêt très sombre en harmonie avec le visuel */
            border-radius: 28px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* Section Image de couverture */
        .cover-section {
            position: relative;
            width: 100%;
            height: 420px; /* Hauteur de la photo */
            overflow: hidden;
        }

        .cover-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* Dégradé sombre sur l'image pour rendre le texte bien lisible */
        .cover-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 60%;
            background: linear-gradient(to top, rgba(27, 46, 37, 1) 0%, rgba(27, 46, 37, 0.4) 50%, rgba(0,0,0,0) 100%);
        }

        /* Positionnement des textes sur l'image */
        .cover-content {
            position: absolute;
            bottom: 25px;
            left: 25px;
            right: 25px;
            z-index: 2;
        }

        .wedding-date {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #a3b899;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .wedding-names {
            font-family: 'Playfair Display', serif;
            font-size: 34px;
            font-style: italic;
            font-weight: 400;
            color: #ffffff;
            margin: 0;
            line-height: 1.2;
        }

        /* Section contenant les explications et le formulaire */
        .form-section {
            padding: 25px;
        }

        /* Séparateur élégant */
        .separator {
            width: 80%;
            height: 1px;
            background: radial-gradient(circle, rgba(255,255,255,0.15) 0%, rgba(255,255,255,0) 100%);
            margin: 0 auto 20px auto;
        }

        /* Instructions stylisées et discrètes */
        .instructions {
            text-align: center;
            font-size: 13px;
            color: #a3b899;
            margin-bottom: 25px;
            line-height: 1.5;
        }

        /* Intégration transparente du Iframe Jotform */
        .iframe-container {
            width: 100%;
            border-radius: 16px;
            overflow: hidden;
            background-color: transparent;
        }

        iframe {
            width: 100%;
            height: 480px; /* Hauteur ajustée pour accueillir le formulaire sur mobile */
            border: none;
            display: block;
        }
    </style>
</head>
<body>

    <div class="phone-card">
        <!-- Partie supérieure : Image + Prénoms superposés -->
        <div class="cover-section">
            <!-- REMPLACEZ "mariage.jpg" PAR VOTRE PROPRE NOM D'IMAGE SI BESOIN -->
            <img src="mariage.jpg" alt="Audrey & Alvin" class="cover-image">
            <div class="cover-overlay"></div>
            <div class="cover-content">
                <!-- Date personnalisable -->
                <div class="wedding-date">30 Juin 2026</div>
                <div class="wedding-names">audrey et alvin</div>
            </div>
        </div>

        <!-- Partie inférieure : Formulaire Jotform -->
        <div class="form-section">
            <div class="separator"></div>
            
            <div class="instructions">
                Laissez un doux souvenir ou un vœu chaleureux en enregistrant votre voix ci-dessous. ✨
            </div>

            <div class="iframe-container">
                <iframe
                    id="JotFormIFrame-261955920276061"
                    title="Formulaire de dépôt audio"
                    onload="window.parent.scrollTo(0,0)"
                    allow="geolocation; microphone; camera"
                    src="https://form.jotform.com/261955920276061"
                    frameborder="0"
                    scrolling="no">
                </iframe>
            </div>
        </div>
    </div>

</body>
</html>
