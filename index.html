<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mariage d'Audrey & Alvin</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Plus+Jakarta+Sans:wght@300;400;600&display=swap" rel="stylesheet">
    
 <style>
        * {
            box-sizing: border-box;
        }
        body {
            font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: #fdfbf7; 
            color: #ffffff;
            margin: 0;
            padding: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .phone-card {
            width: 100%;
            max-width: 480px;
            background-color: #f09f90;
            border-radius: 28px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(240, 159, 144, 0.3); 
            border: none;
        }

        .cover-section {
            position: relative;
            width: 100%;
            height: auto;
            overflow: hidden;
        }

        .cover-image {
            width: 100%;
            height: auto;
            object-fit: contain;
            display: block;
        }

        .cover-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 60%;
            background: linear-gradient(to top, #f09f90 0%, rgba(240, 159, 144, 0.3) 60%, rgba(0,0,0,0) 100%);
        }

        .cover-content {
            position: absolute;
            bottom: 25px;
            left: 25px;
            right: 25px;
            z-index: 2;
        }

        .wedding-date {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #ffffff;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .wedding-names {
            font-family: 'Playfair Display', serif;
            font-size: 34px;
            font-style: italic;
            font-weight: 400;
            color: #ffffff; 
            margin: 0;
            line-height: 1.2;
        }

        .form-section {
            padding: 25px;
        }

        .separator {
            width: 60%;
            height: 1px;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.6) 0%, rgba(255, 255, 255, 0) 100%);
            margin: 0 auto 20px auto;
        }

        .instructions {
            text-align: center;
            font-size: 13.5px;
            color: #ffffff; 
            margin-bottom: 25px;
            line-height: 1.6;
            text-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }

        .iframe-container {
            width: 100%;
            border-radius: 16px;
            overflow: hidden;
            background-color: transparent;
        }

        iframe {
            width: 100%;
            height: 1400px;
            border: none;
            display: block;
        }
    </style>
</head>
<body>

    <div class="phone-card">
        <div class="cover-section">
           
            <img src="AA2.jpg" alt="Audrey & Alvin" class="cover-image">
            <div class="cover-overlay"></div>
            <div class="cover-content">
                <div class="wedding-date">18 juillet 2026</div>
                <div class="wedding-names">Audrey & Alvin</div>
            </div>
        </div>

        <div class="form-section">
            <div class="separator"></div>
            
            <div class="instructions">
                Laissez un message pour nos mariés ✨
            </div>

            <div class="iframe-container">
                <iframe
                    id="JotFormIFrame-261972729252061"
                    title="Formulaire de dépôt audio"
                    onload="window.parent.scrollTo(0,0)"
                    allow="geolocation; microphone; camera"
                    src="https://form.jotform.com/261972729252061"
                    frameborder="0"
                    scrolling="no">
                </iframe>

                <!--https://form.jotform.com/261976835753069 -->
                <!--
               <iframe
                    id="JotFormIFrame-261976835753069"
                    title="Formulaire de dépôt audio"
                    onload="window.parent.scrollTo(0,0)"
                    allow="geolocation; microphone; camera"
                    src="https://form.jotform.com/261976835753069"
                    frameborder="0"
                    scrolling="no">
                </iframe> -->
            </div>
        </div>
    </div>

</body>
</html>
